# Gently demo config for VM at 192.168.30.81
# Disk: /dev/sda 8GB — GPT + UEFI
# CPU: 1 core i5-11320H — binary kernel recommended
# RAM: ~946 MB

[system]
hostname = "gently-vm"
timezone = "Europe/Madrid"
locale   = "es_ES.UTF-8"
locales  = ["es_ES.UTF-8 UTF-8", "en_US.UTF-8 UTF-8"]
keymap   = "es"
lang     = "es_ES.UTF-8"

[stage3]
arch    = "amd64"
variant = "openrc"
mirror  = "https://distfiles.gentoo.org"

[[disks]]
id              = "primary"
device          = "/dev/vda"
partition_table = "gpt"
boot_mode       = "uefi"

[[disks.partitions]]
label      = "esp"
size       = "128M"
filesystem = "vfat"
mount      = "/boot/efi"
flags      = ["esp"]

[[disks.partitions]]
label      = "swap"
size       = "512M"
filesystem = "swap"

[[disks.partitions]]
label         = "root"
size          = "remaining"
filesystem    = "ext4"
mount         = "/"
mount_options = "noatime"

[portage]
cflags          = "-O2 -pipe"
cxxflags        = "-O2 -pipe"
use             = ["-bluetooth", "-cups", "-X"]
accept_keywords = "amd64"
accept_license  = "@FREE"

[portage.profile]
name = "default/linux/amd64/23.0"

[kernel]
method = "binary"

[bootloader]
type = "grub"

[bootloader.grub]
platforms = ["efi-64"]
timeout   = 5

[services.roles]
network = "NetworkManager"
ssh     = "openssh"
cron    = "cronie"
logging = "sysklogd"
ntp     = "chrony"

[[users.accounts]]
name   = "gently"
groups = ["wheel", "audio", "video", "usb", "plugdev"]
shell  = "/bin/bash"

[users]
credentials_file = "credentials.toml"

[distcc]
enabled = true

# Hosts in native distcc format:
#   "host"            — default slots (4)
#   "host/N"          — N slots
#   "host/N,lzo"      — with lzo compression
#   "host/N,lzo,cpp"  — with pump mode enabled per host
hosts = [
    "192.168.2.3/36,lzo",
    "94.23.0.137/36",
    "localhost/2",
]

# Pump mode: distributed preprocessing on the remote host.
# Requires all hosts to have cpp declared in hosts above.
pump_mode = false

# If true, emerge distcc on the installed system in addition to using it
# during the installation.
install_on_target = true